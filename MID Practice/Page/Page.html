<!DOCTYPE html>
<html>

<head>
    <title>Text Analyzer Tool</title>
    <link rel="stylesheet" href="E:\WebTech\MID Practice\Design\Style.css">
</head>

<body>
    <h1>Text Analyzer Tool</h1>
    <div class="maindiv">
        <div class="inputText">
            <textarea name="text" id="text" cols="100" rows="20"></textarea>
            <br>
            <button onclick="analyzeText()">Analyze Text</button>
        </div>
        <div class="outputText">
            <label for="char">Character Count: </label>
            <p id="char">0</p>
            <br>

            <label for="word">Word Count: </label>
            <p id="word">0</p>
            <br>

            <label for="reserveText">Reserve Text: </label>
            <p id="reserveText"></p>
        </div>
    </div>


    <script src="E:\WebTech\MID Practice\JS\Validation.js"></script>

</body>

</html>
